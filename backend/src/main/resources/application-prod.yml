server:
  port: 8080
  tomcat:
    max-swallow-size: -1

spring:
  datasource:
    url: jdbc:postgresql://dpg-d44cvvali9vc73e8vimg-a:5432/godwitcare_prod
    username: ${DB_USERNAME:godwitcare_prod_user}
    password: ${DB_PASSWORD:C7vRQI9fsjY5KhXCjlot7unHZcp6wYnA}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # consider 'validate' once you add Flyway
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc.lob.non_contextual_creation: true
        format_sql: true
  sql:
    init:
      mode: never        # don't auto-run schema/data scripts in prod
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB
    flyway:
      enabled: true
      baseline-on-migrate: true
      locations: classpath:db/migration/postgresql


# Log levels (prod-appropriate)
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.hibernate.type.descriptor.sql: TRACE

twilio:
  account:
    sid: ${TWILIO_ACCOUNT_SID}
  auth:
    token: ${TWILIO_AUTH_TOKEN}
  whatsapp:
    from: +14155238886

otp:
  expiry-seconds: 300


app:
  jwt:
    secret: ${APP_JWT_SECRET:godwitcare-development-jwt-secret-change-me-please-32-bytes-minimum}
    expiration-ms: 900000
    issuer: godwitcare
  # Stripe settings live in application.yml so profile-specific files do not
  # accidentally override keys that were configured in the base file.
  # Prefer STRIPE_SECRET_KEY and STRIPE_PUBLISHABLE_KEY environment variables
  # for deployed environments. For compatibility, top-level stripe.* keys are
  # also accepted by StripeProperties when app.stripe.* is not present.
