server:
  port: 8080
  tomcat:
    max-swallow-size: -1

spring:
  datasource:
    url: jdbc:h2:mem:godwitcare;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration/h2
    baseline-on-migrate: true
    validate-on-migrate: false
  logging:
    level:
      org.hibernate.SQL: INFO
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB



app:
  jwt:
    secret: ${APP_JWT_SECRET:godwitcare-development-jwt-secret-change-me-please-32-bytes-minimum}
    expiration-ms: 900000
    issuer: godwitcare
  # Stripe settings live in application.yml so profile-specific files do not
  # accidentally override keys that were configured in the base file.
  # Prefer STRIPE_SECRET_KEY and STRIPE_PUBLISHABLE_KEY environment variables
  # for deployed environments.
